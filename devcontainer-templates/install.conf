# DevContainer Template Installer Configuration
# This file provides defaults for the install script
# Command-line arguments override these values

# ============================================================================
# TARGET CONFIGURATION
# ============================================================================

# Target directory for installation (relative or absolute path)
# Can be overridden with: install.sh --target /path/to/project
TARGET_DIR="."

# Template to install (base, node-typescript, node-typescript-postgres, node-ai-stack)
# Can be overridden with: install.sh --template node-typescript
TEMPLATE="base"

# ============================================================================
# OPTIONAL FEATURES (node-ai-stack template)
# ============================================================================

# AI Tool Installation (true/false)
# Note: These are set by template defaults (see apply_template_defaults in install.sh)
# Leave unset here so template-specific defaults can be applied
# INSTALL_CLAUDE_CODE=""
# INSTALL_GEMINI_CLI=""
# INSTALL_CODEX_CLI=""
# INSTALL_UV=""
INSTALL_SPECIFY_CLI="false"

# Python version (if INSTALL_UV=true)
# PYTHON_VERSION=""

# ============================================================================
# MOUNTS (node-ai-stack template)
# ============================================================================

# Enable Claude configuration mount (true/false)
# Uses ${localEnv:HOME}/.claude in devcontainer.json
MOUNT_CLAUDE_CONFIG="false"

# Enable OSS projects mount (true/false)
MOUNT_OSS_PROJECTS="false"

# OSS projects base directory
OSS_PROJECTS_PATH=""

# Individual OSS projects to mount (comma-separated)
OSS_PROJECT_1=""
OSS_PROJECT_2=""

# Enable Docker socket mount (true/false) - SECURITY WARNING
MOUNT_DOCKER_SOCKET="false"

# ============================================================================
# DATABASE CONFIGURATION (postgres templates)
# ============================================================================

# PostgreSQL connection details
POSTGRES_HOST="localhost"
POSTGRES_PORT="5432"
POSTGRES_DB=""
POSTGRES_USER=""
POSTGRES_PASSWORD=""

# Docker network for database connection (leave empty if not using)
DOCKER_NETWORK=""

# ============================================================================
# PORT FORWARDING
# ============================================================================

# Ports to forward (comma-separated)
# Default depends on template - will be auto-configured if empty
FORWARD_PORTS=""

# ============================================================================
# INSTALLATION OPTIONS
# ============================================================================

# Create .env file from .env.template (true/false)
CREATE_ENV_FILE="true"

# Add .devcontainer/.env to .gitignore (true/false)
ADD_TO_GITIGNORE="true"

# Backup existing .devcontainer directory (true/false)
BACKUP_EXISTING="true"

# Backup directory name (relative to target)
BACKUP_DIR=".devcontainer.backup"

# ============================================================================
# ADVANCED OPTIONS
# ============================================================================

# Skip validation checks (not recommended)
SKIP_VALIDATION="false"

# Verbose output
VERBOSE="false"
