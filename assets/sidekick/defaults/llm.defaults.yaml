# LLM Profile Configuration Defaults
# This file defines named LLM profiles that features can reference.
# Override in ~/.sidekick/llm.yaml or .sidekick/llm.yaml

# Default profile used when no specific profile is requested
defaultProfile: fast-lite

# Primary profiles - referenced by features
profiles:
  # General-purpose analytical profile (default)
  analytical:
    provider: openrouter
    model: x-ai/grok-4-fast
    temperature: 0
    maxTokens: 4096
    timeout: 30
    timeoutMaxRetries: 3

  # Fast, cheap profile for simple tasks
  fast-lite:
    provider: openrouter
    model: google/gemini-2.0-flash-lite-001
    temperature: 0
    maxTokens: 1000
    timeout: 15
    timeoutMaxRetries: 2

  # Creative profile for short-form content
  creative:
    provider: openrouter
    model: qwen/qwen3-235b-a22b-2507
    temperature: 1.2
    maxTokens: 100
    timeout: 10
    timeoutMaxRetries: 2

  # Creative profile for longer content
  creative-long:
    provider: openrouter
    model: qwen/qwen3-235b-a22b-2507
    temperature: 1.2
    maxTokens: 500
    timeout: 20
    timeoutMaxRetries: 2

# Fallback profiles - only used when primary fails
fallbacks:
  cheap-fallback:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
    temperature: 0
    maxTokens: 1000
    timeout: 30
    timeoutMaxRetries: 3

# Global settings
global:
  debugDumpEnabled: false
