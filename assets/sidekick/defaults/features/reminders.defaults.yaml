# Reminders Feature Defaults
# This file defines default values for the reminders feature.
# Override in ~/.sidekick/features.yaml or .sidekick/features.yaml under features.reminders

# Enable or disable the reminders feature
enabled: true

settings:
  # Tool calls per turn that trigger the "pause and reflect" reminder.
  # Counts tool invocations since the last user prompt (toolsThisTurn metric).
  # Fires when: toolsThisTurn >= pause_and_reflect_threshold
  pause_and_reflect_threshold: 60

  # Glob patterns that trigger verify-completion reminder on file edit.
  # Uses picomatch syntax: https://github.com/micromatch/picomatch
  # Only edits to files matching these patterns will stage the reminder.
  # Documentation files (*.md) are excluded by default.
  source_code_patterns:
    # TypeScript/JavaScript
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.jsx"
    # Python
    - "**/*.py"
    # Go
    - "**/*.go"
    # Rust
    - "**/*.rs"
    # JVM languages
    - "**/*.java"
    - "**/*.kt"
    - "**/*.scala"
    # Swift
    - "**/*.swift"
    # C/C++
    - "**/*.c"
    - "**/*.cpp"
    - "**/*.h"
    - "**/*.hpp"
    # Ruby
    - "**/*.rb"
    # PHP
    - "**/*.php"
    # C#
    - "**/*.cs"
    # Shell
    - "**/*.sh"
    # Config files
    - "**/*.yaml"
    - "**/*.yml"
    - "**/*.toml"
    # Specific important files
    - "**/package.json"
    - "**/tsconfig.json"
    - "**/Dockerfile"
    - "**/Makefile"

  # Maximum re-evaluation cycles for non-blocking verification.
  # When verify-completion fires but doesn't block (e.g., ASKING_QUESTION),
  # we track unverified changes and re-stage on the next UserPromptSubmit.
  # This limits how many times we'll re-evaluate before giving up.
  # -1 = unlimited (default), 0 = disabled, positive = exact limit
  max_verification_cycles: -1

  # Per-tool verification tracking.
  # Each tool category tracks whether its verification command has been run.
  # When source files are edited, tools transition to STAGED (needing re-run).
  # When the tool's command is observed, it transitions to VERIFIED.
  # After VERIFIED, a configurable number of file edits (clearing_threshold) triggers re-staging.
  verification_tools:
    build:
      enabled: true
      patterns:
        - "pnpm build"
        - "npm run build"
        - "yarn build"
        - "tsc"
        - "esbuild"
        - "python setup.py build"
        - "pip install"
        - "poetry build"
        - "mvn compile"
        - "mvn package"
        - "gradle build"
        - "gradlew build"
        - "go build"
        - "cargo build"
        - "make build"
        - "cmake --build"
        - "docker build"
      clearing_threshold: 3
      clearing_patterns:
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.py"
        - "**/*.java"
        - "**/*.kt"
        - "**/*.go"
        - "**/*.rs"
        - "**/*.c"
        - "**/*.cpp"
        - "**/*.cs"
    typecheck:
      enabled: true
      patterns:
        - "pnpm typecheck"
        - "tsc --noEmit"
        - "mypy"
        - "pyright"
        - "pytype"
        - "go vet"
      clearing_threshold: 3
      clearing_patterns:
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.py"
        - "**/*.go"
    test:
      enabled: true
      patterns:
        - "pnpm test"
        - "npm test"
        - "yarn test"
        - "vitest"
        - "jest"
        - "pytest"
        - "python -m pytest"
        - "go test"
        - "cargo test"
        - "mvn test"
        - "gradle test"
        - "gradlew test"
        - "dotnet test"
        - "make test"
      clearing_threshold: 3
      clearing_patterns:
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.py"
        - "**/*.java"
        - "**/*.kt"
        - "**/*.go"
        - "**/*.rs"
        - "**/*.test.*"
        - "**/*.spec.*"
        - "**/test_*"
    lint:
      enabled: true
      patterns:
        - "pnpm lint"
        - "npm run lint"
        - "yarn lint"
        - "eslint"
        - "ruff check"
        - "flake8"
        - "pylint"
        - "golangci-lint"
        - "cargo clippy"
        - "ktlint"
        - "dotnet format"
      clearing_threshold: 5
      clearing_patterns:
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.py"
        - "**/*.java"
        - "**/*.kt"
        - "**/*.go"
        - "**/*.rs"

  # Smart completion detection settings
  # Classifies assistant's stopping intent to avoid blocking when not claiming completion
  completion_detection:
    # Enable/disable smart completion detection (if disabled, always blocks on verify-completion)
    enabled: true
    # Minimum confidence threshold to treat as claiming completion (0.0-1.0)
    # Higher = more conservative (blocks less often)
    confidence_threshold: 0.7
    # LLM profile for classification (uses fast, cheap models)
    llm:
      profile: fast-lite
      fallback_profile: cheap-fallback
